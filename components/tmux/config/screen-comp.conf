# This file contains screen compatibility bindings

# Prefix
set -g prefix C-b
bind C-b send-prefix

# C-B C-B movement
bind-key C-b last-window

# Beginning of the line
bind a send-prefix

# Commands
set -g command-alias[0] quit='kill-session'
set -g command-alias[1] help='list-commands'
set -g command-alias[2] title='rename-window'

# Navigate windows (Alt+Arrow)
bind -n M-Left previous-window
bind -n M-Right next-window

# Move windows (Ctrl+Shift+Alt+Arrow)
bind -n C-M-S-Left swap-window -t -1\; select-window -t -1
bind -n C-M-S-Right swap-window -t +1\; select-window -t +1

# Navigate panes/regions (Ctrl+Shift+Arrow)
bind -n C-S-Left select-pane -t :.-
bind -n C-S-Right select-pane -t :.+

# Split layouts (Prefix + Shift+1/2/3/4)
# ! = single pane (close all others)
bind ! kill-pane -a
# @ = two vertical panes, focus left
bind @ run-shell "tmux kill-pane -a; tmux split-window -h; tmux select-pane -L"
# \# = three panes (two vertical, right one split horizontal), focus left
bind '#' run-shell "tmux kill-pane -a; tmux split-window -h; tmux select-pane -R; tmux split-window -v; tmux select-pane -L"
# $ = four panes (2x2 grid), focus top-left
bind '$' run-shell "tmux kill-pane -a; tmux split-window -v; tmux split-window -h; tmux select-pane -U; tmux split-window -h; tmux select-pane -L"

# Double status bar (matching screen's caption + hardstatus)
set -g status 2
set -g status-style "bg=blue fg=white"

# Top status line - window list (like screen's caption)
set -g status-format[0] "#[bg=blue fg=white]#{W:#[bg=blue fg=white] #I #W ,#[bg=brightblue fg=white] #I #W }"

# Bottom status line - session info and date (like screen's hardstatus)
set -g status-format[1] "#[fill=green]#[bg=yellow fg=black] [#S | #(echo $SHELL)] #[bg=green fg=white] #(whoami)@#H  #[align=right]#[bg=yellow fg=black] #(LC_ALL=C date +'%%a %%d %%b %%Y - %%H:%%M') "

# Disable the default single status bar settings
set -g status-left ""
set -g status-right ""

